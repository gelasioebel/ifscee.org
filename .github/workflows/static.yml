# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages and Oracle Cloud OpenBSD server

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SCP
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PASS: ${{ secrets.SSH_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "=== KEY FILE ==="
          wc -l ~/.ssh/id_deploy
          head -1 ~/.ssh/id_deploy
          tail -1 ~/.ssh/id_deploy
          echo "=== KEYSCAN ==="
          ssh-keyscan -H ifscee.org >> ~/.ssh/known_hosts 2>&1 || echo "keyscan failed"
          echo "=== AGENT ==="
          eval $(ssh-agent -s)
          echo '#!/bin/sh' > /tmp/askpass.sh
          echo "echo \"\$SSH_PASS\"" >> /tmp/askpass.sh
          chmod +x /tmp/askpass.sh
          echo "=== SSH-ADD ==="
          SSH_ASKPASS=/tmp/askpass.sh SSH_ASKPASS_REQUIRE=force SSH_PASS="$SSH_PASS" ssh-add ~/.ssh/id_deploy 2>&1 || echo "ssh-add failed"
          echo "=== SCP ==="
          scp -v -r ./* root@ifscee.org:/var/www/htdocs/ 2>&1 || echo "scp failed"
          rm -f /tmp/askpass.sh ~/.ssh/id_deploy
          ssh-agent -k
